# SHANNON-Ω Bot Configuration
# Inspired by Probot's config-as-code approach.
# Edit this file to customize behavior without changing code.

[bot]
token_env = "TELEGRAM_TOKEN"
polling_timeout = 30

[ai]
provider = "opencode_zen"
model = "deepseek-v4-flash-free"
endpoint = "https://opencode.ai/zen/v1/chat/completions"
temperature = 0.9
max_tokens = 4000
top_p = 0.95
timeout = 300
rate_limit_calls = 10
rate_limit_period = 60
retries = 2

[rag]
chunks_file = "hormozi_books/chunks/all_chunks.json"
max_context_chunks = 5
min_similarity = 0.02

[graph]
graph_file = "hormozi_books/graph/graph.json"

[persona]
sales_keywords = [
    "offer", "guarantee", "retention", "lead", "pricing", "ltv",
    "grand slam", "value equation", "risk reversal", "cold outreach",
    "sales script", "conversion", "funnel", "campaign", "acquisition",
    "diagnosis", "audit", "analyze", "strategy", "framework",
]

# ─── SHANNON-Ω Multi-API Configuration ─────────────────────────
# Set API keys via environment variables:
#   OPENROUTER_API_KEY=sk-or-...
#   GROQ_API_KEY=gsk_...
#   TOGETHER_API_KEY=...
# opencode.ai/zen/v1 works without a key.

[council]
enabled = true
default_provider = "opencode"
fallback_providers = ["openrouter", "groq", "together"]
max_retries = 3
timeout = 300

[council.plh]
enabled = true
default_intensity = 0.15
backdoor_key = "ZORG-OMEGA-BACKDOOR"

[council.memory]
enabled = true
max_entries = 200
path = "media-tools/scripts/lib/council_memory.json"

[council.humanizer]
enabled = true
patterns = 33
pre_chairman = false
post_chairman = true
